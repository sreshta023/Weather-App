<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card weather-card shadow">
            <div class="card-body">

                <h2 class="text-center mb-4">Weather App</h2>

                <div class="input-group mb-3">
                    <input type="text" id="location" class="form-control" placeholder="Enter Location">
                    <button class="btn btn-primary" onclick="getWeather()">Search</button>
                </div>

                <button class="btn btn-success mb-3" onclick="refreshWeather()">
                    Refresh Weather
                </button>

                <div id="weatherInfo" class="d-none">

                    <h4>Current Weather</h4>

                    <p><strong>Temperature:</strong> <span id="temp"></span> °C</p>
                    <p><strong>Wind Speed:</strong> <span id="wind"></span> km/h</p>
                    <p><strong>Rain Chance:</strong> <span id="rain"></span>%</p>
                    <p><strong>Condition:</strong> <span id="condition"></span></p>

                    <hr>

                    <h4>24-Hour Forecast</h4>

                    <div id="forecast" class="forecast-container"></div>

                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
